services:
  # Backend API Service
  - type: web
    name: sumurai-backend
    runtime: python
    plan: starter
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: OLLAMA_HOST
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: llama3.2:3b
      - key: USE_GROQ_FALLBACK
        value: "true"
      - key: GROQ_LLM_MODEL
        value: llama-3.1-8b-instant
            - key: CORS_ORIGINS
              value: https://sumurai-frontend.onrender.com,https://sumurai.pro
            # Email notification configuration
            - key: EMAIL_PROVIDER
              value: "smtp"  # Options: "smtp" or "sendgrid"
            - key: SMTP_HOST
              value: smtp.gmail.com
            - key: SMTP_PORT
              value: "587"
            - key: SMTP_USER
              sync: false  # Your email address
            - key: SMTP_PASSWORD
              sync: false  # Your email app password
            - key: FROM_EMAIL
              value: noreply@sumurai.app
            # SendGrid (alternative to SMTP - set EMAIL_PROVIDER=sendgrid to use)
            - key: SENDGRID_API_KEY
              sync: false
            # Slack notification configuration
            - key: SLACK_WEBHOOK_URL
              sync: false  # Slack incoming webhook URL

  # Frontend Service
  - type: web
    name: sumurai-frontend
    runtime: node
    plan: starter
    rootDir: sumurai
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: NEXT_PUBLIC_API_URL
        value: https://sumurai-backend.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false